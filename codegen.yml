schema: https://graphql.seek.com/graphql

generates:
  ./fe/src/types/seekApi.graphql.ts:
    documents: fe/src/components/**/queries.ts
    plugins:
      - typescript
      - typescript-operations
    config:
      enumsAsConst: true
      scalars:
        Date: string
        DateTime: string
        HistoryDate: string
      skipTypeNameForRoot: true

  ./fe/src/types/seekApi.typeDefs.ts:
    plugins:
      - typescript-typedefs.js

  ./fe/src/types/apolloHelpers.ts:
    plugins:
      - typescript-apollo-client-helpers
    config:
      useTypeImports: true

config:
  declarationKind: interface
  namingConvention:
    transformUnderscore: true
